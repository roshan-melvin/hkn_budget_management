services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: hkn-budget-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hkn_budget_db
      MYSQL_USER: hkn_user
      MYSQL_PASSWORD: hkn_password
    ports:

      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hkn-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend + Frontend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hkn-budget-app
    restart: unless-stopped
    ports:
      - "5000:4000"  # Backend API & Admin
      - "5173:4000"  # Frontend (served by backend)
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: hkn_budget_db
      DB_USER: hkn_user
      DB_PASSWORD: hkn_password
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hkn-network
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

networks:
  hkn-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
