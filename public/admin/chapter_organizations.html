<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Chapter Organizations - Admin | IEEE HKN Budget</title>
</head>

<body>
    <div class="container">
        <header>
            <h1>📚 Chapter Organizations</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="chapter_organizations.html" class="active">Organizations</a>
                <a href="academic_years.html">Academic Years</a>
                <a href="categories.html">Categories</a>
                <a href="deadlines.html">Deadlines</a>
                <button onclick="logout()" class="btn-logout">Sign Out</button>
            </nav>
        </header>

        <div class="card">
            <div id="message"></div>

            <div class="form-group">
                <h2 style="margin-bottom: 20px;">Add New Organization</h2>
                <form id="addForm">
                    <div class="form-group">
                        <label for="orgName">Organization Name *</label>
                        <input type="text" id="orgName" placeholder="e.g., University of California, Berkeley" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Organization</button>
                </form>
            </div>

            <hr style="margin: 30px 0; border: none; border-top: 1px solid #eee;">

            <h2 style="margin-bottom: 20px;">All Organizations</h2>
            <div id="organizationsTable">
                <div class="loading">Loading organizations...</div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Edit Organization</h2>
            </div>
            <form id="editForm">
                <input type="hidden" id="editOrgId">
                <div class="form-group">
                    <label for="editOrgName">Organization Name *</label>
                    <input type="text" id="editOrgName" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="editOrgActive"> Active
                    </label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="chapter_organizations.js"></script>
    <script src="admin-check.js"></script>
    <script src="admin-logout.js"></script>
</body>

</html>
